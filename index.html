<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopwazan | متجر وزان</title>
    <style>
        /* تنسيقات عامة */
        :root {
            --primary-color: #2c3e50;
            --accent-color: #e67e22;
            --bg-light: #f4f7f6;
            --text-dark: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-light);
            color: var(--text-dark);
        }

        /* الهيدر (Header) */
        header {
            background-color: var(--primary-color);
            color: white;
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        header .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--accent-color);
        }

        nav a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            transition: 0.3s;
        }

        nav a:hover {
            color: var(--accent-color);
        }

        /* قسم البطولة (Hero Section) */
        .hero {
            text-align: center;
            padding: 60px 20px;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://via.placeholder.com/1200x400');
            background-size: cover;
            color: white;
        }

        .hero h1 { font-size: 2.5rem; margin-bottom: 10px; }

        /* قسم المنتجات (Products Grid) */
        .container {
            width: 90%;
            margin: 40px auto;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
        }

        .product-card {
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            text-align: center;
            transition: transform 0.3s;
        }

        .product-card:hover { transform: translateY(-5px); }

        .product-card img {
            max-width: 100%;
            border-radius: 5px;
        }

        .btn-buy {
            background-color: var(--accent-color);
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            margin-top: 10px;
        }

        /* الفوتر (Footer) */
        footer {
            background: var(--primary-color);
            color: white;
            text-align: center;
            padding: 20px;
            margin-top: 50px;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">Shopwazan</div>
        <nav>
            <a href="#">الرئيسية</a>
            <a href="#">المنتجات</a>
            <a href="#">اتصل بنا</a>
        </nav>
    </header>

    <section class="hero">
        <h1>مرحباً بكم في Shopwazan</h1>
        <p>وجهتكم الأولى لأفضل المنتجات الرقمية والخدمات</p>
    </section>

    <div class="container">
        <h2 style="text-align: center; margin-bottom: 30px;">أحدث المنتجات</h2>
        
        <div class="products-grid">
            <div class="product-card">
                <img src="https://via.placeholder.com/200" alt="منتج">
                <h3>قالب تصميم عصري</h3>
                <p>99 درهم</p>
                <a href="#" class="btn-buy">شراء الآن</a>
            </div>

            <div class="product-card">
                <img src="https://via.placeholder.com/200" alt="منتج">
                <h3>خدمة تطوير ويب</h3>
                <p>499 درهم</p>
                <a href="#" class="btn-buy">طلب الخدمة</a>
            </div>

            <div class="product-card">
                <img src="https://via.placeholder.com/200" alt="منتج">
                <h3>دورة تدريبية</h3>
                <p>150 درهم</p>
                <a href="#" class="btn-buy">اشتراك</a>
            </div>
        </div>
    </div>

    <footer>
        <p>جميع الحقوق محفوظة لـ Shopwazan &copy; 2026</p>
    </footer>

</body>
</html>
